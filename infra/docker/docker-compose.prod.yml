version: '3.8'

# Production overrides — extend the base docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  timescaledb:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quantpulse_prod}

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-quantpulse_redis_prod}

  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: quantpulse-backend
    restart: always
    env_file:
      - ../../.env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    container_name: quantpulse-worker
    restart: always
    env_file:
      - ../../.env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: quantpulse-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ../../
      dockerfile: apps/frontend/Dockerfile
    container_name: quantpulse-frontend
    restart: always
    env_file:
      - ../../.env
    depends_on:
      - backend
