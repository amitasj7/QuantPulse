  #     - ../../.env
  #   depends_on:
  #     timescaledb:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # worker:
  #   build:
  #     context: ../../
  #     dockerfile: apps/worker/Dockerfile
  #   container_name: quantpulse-worker
  #   env_file:
  #     - ../../.env
  #   depends_on:
  #     timescaledb:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  timescaledb_data:
  redis_data:
